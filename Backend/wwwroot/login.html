<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Hub | Sentinel</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --nstech-orange: #ff6b00;
            --nstech-orange-hover: #e65c00;
            --nstech-gray-bg: #f8fafc;
            --nstech-white: #ffffff;
            --nstech-text-dark: #1e293b;
            --nstech-text-light: #64748b;
            --nstech-border: #e2e8f0;
            --nstech-input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: var(--nstech-gray-bg);
            font-family: 'Inter', sans-serif;
            color: var(--nstech-text-dark);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: var(--nstech-white);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border-radius: 16px;
            padding: 48px 40px;
            position: relative;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--nstech-blue-dark);
        }

        .form-header p {
            color: var(--nstech-text-light);
            font-size: 1rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--nstech-text-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--nstech-text-light);
            width: 20px;
            height: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            background: var(--nstech-input-bg);
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 1rem;
            color: var(--nstech-text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            background: var(--nstech-white);
            border-color: var(--nstech-orange);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--nstech-orange);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin-top: 32px;
        }

        .btn-login:hover {
            background: var(--nstech-orange-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 24px;
            display: none;
            align-items: center;
            gap: 8px;
            border: 1px solid #fee2e2;
            font-weight: 500;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }

            .form-header h2 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="form-header">
            <h2>Bem-vindo ao Hub</h2>
            <p>Identifique-se para acessar a central de perícia.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <div class="input-wrapper">
                    <i data-lucide="user" class="input-icon"></i>
                    <input type="text" id="username" class="form-input" placeholder="seu.nome" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span>ACESSAR HUB</span>
                <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>
        </form>

        <div id="errorMsg" class="error-msg">
            <i data-lucide="alert-circle" style="width: 18px;"></i>
            <span id="errorText">Usuário ou senha inválidos</span>
        </div>

        <div class="footer">
            © 2026 nstech sentinel • v2.0.4-stable
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function handleLogin(e) {
            e.preventDefault();

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const btnLogin = document.getElementById('btnLogin');

            errorMsg.style.display = 'none';
            btnLogin.disabled = true;
            const originalContent = btnLogin.innerHTML;
            btnLogin.innerHTML = '<i data-lucide="loader-2" class="animate-spin" style="width: 18px;"></i><span>AUTENTICANDO...</span>';
            lucide.createIcons();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('sentinel-auth', 'true');
                    localStorage.setItem('sentinel-user', result.username);
                    localStorage.setItem('sentinel-role', result.role);

                    btnLogin.style.background = '#10b981'; // Green
                    btnLogin.innerHTML = '<i data-lucide="check" style="width: 18px;"></i><span>ACESSO AUTORIZADO</span>';
                    lucide.createIcons();

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                } else {
                    errorText.textContent = result.message || 'Credenciais inválidas';
                    errorMsg.style.display = 'flex';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorText.textContent = 'Falha na conexão com o Hub';
                errorMsg.style.display = 'flex';
            }

            btnLogin.disabled = false;
            btnLogin.innerHTML = originalContent;
            lucide.createIcons();
            document.getElementById('password').value = '';
        }
    </script>
</body>

</html>
